        <div class="header">

            <div class="nav-bar">

                <a href="../pages/about.html" class="nav-links">

        <div id="MobileNavMenu">
            <a href="../index.html" class="nav-links">
                <div>Home</div>
            </a>
            <a href="../pages/about.html" class="nav-links">
                <div>About</div>
            </a>
            <a href="../pages/skills.html" class="nav-links">

            </a>
            <a href="../pages/projects.html" class="nav-links">
                <div>Projects</div>
            </a>
            <div>Contact</div>
        </div>

        <div class="main-body">
            <div class="mb mb-col1">
                <div>
                    <h1 class="contact-headers Headtext">Contact Me</h1>
                    <p style="text-indent: 40px;">If you have any quiries or just want to
                        say hi, please use the contact form!</p>
                </div>
                <div class="socail-links">
                    <h3 class="contact-headers">Social Links:</h3>
                    <div class="contact-items">
                        <a href="mailto:gurumoorthiofficial06@gmail.com" class="contact-text nav-links"><img
                                src="../assests/email.png" alt="mail-icon" width="20">
                            gurumoorthiofficial06@gmail.com</a>
                    </div>
                    <div class="contact-items">

                        <a href="https://www.linkedin.com/in/profile-of-gurumoorthi" class="contact-text nav-links"><img
                                src="../assests/linkedin.png" alt="linkedin-icon" width="20">
                            LinkedIn Profile</a>
                    </div>
                    <div class="contact-items">

                        <a href="https://github.com/Guru-moorthi-n" class="contact-text nav-links"><img
                                src="../assests/github.png" alt="github-icon" width="20">
                            GitHub Profile</a>
                    </div>
                    <div class="contact-items">

                        <a href="https://guru-moorthi-n.github.io/Guru-Portfolio/" class="contact-text nav-links"><img
                                src="../assests/cv.png" alt="portfolio-icon" width="20">
                            Portfolio Website</a>
                    </div>
                </div>
            </div>
            <div class="mb mb-col2">
                <div class="contact-form">
                    <form id="contact-form">
                        <label for="name" class="form-headers">Name* :</label>
                        <input class="form-inputs" type="text" id="Name" name="name" required><br><br>

                        <label for="email" class="form-headers">Email* :</label>
                        <input class="form-inputs" type="email" id="Email" name="email" required><br><br>

                        <label for="message" class="form-headers">Message* :</label><br>
                        <textarea class="form-inputs message-area" id="Message" name="message" required></textarea>
                        <br>
                        <button class="submitBtn" type="submit">Send Message</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="../Js/contact.js" charset="UTF-8"></script>
